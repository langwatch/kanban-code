name: Release

on:
  push:
    branches: [main]
  release:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PAT }}

  build:
    needs: release-please
    if: >-
      always() && (
        (github.event_name == 'release') ||
        (needs.release-please.outputs.release_created == 'true')
      )
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version and tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ needs.release-please.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ needs.release-please.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release binary
        run: swift build -c release

      - name: Create app bundle
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          ARCH=$(uname -m)
          BUNDLE_DIR=build/KanbanCode.app

          mkdir -p "$BUNDLE_DIR/Contents/MacOS"
          mkdir -p "$BUNDLE_DIR/Contents/Resources"

          cp ".build/${ARCH}-apple-macosx/release/KanbanCode" "$BUNDLE_DIR/Contents/MacOS/KanbanCode"
          cp Sources/KanbanCode/Resources/AppIcon.icns "$BUNDLE_DIR/Contents/Resources/AppIcon.icns"

          cat > "$BUNDLE_DIR/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>CFBundleExecutable</key><string>KanbanCode</string>
          <key>CFBundleIdentifier</key><string>com.kanban-code.app</string>
          <key>CFBundleName</key><string>Kanban Code</string>
          <key>CFBundleVersion</key><string>${VERSION}</string>
          <key>CFBundleShortVersionString</key><string>${VERSION}</string>
          <key>CFBundlePackageType</key><string>APPL</string>
          <key>LSMinimumSystemVersion</key><string>15.0</string>
          <key>NSHighResolutionCapable</key><true/>
          <key>LSUIElement</key><false/>
          <key>CFBundleIconFile</key><string>AppIcon</string>
          <key>CFBundleIconName</key><string>AppIcon</string>
          </dict></plist>
          PLIST

          # Copy SPM resource bundle at .app root (where Bundle.main.bundleURL points)
          if [ -d ".build/${ARCH}-apple-macosx/release/KanbanCode_KanbanCode.bundle" ]; then
            cp -R ".build/${ARCH}-apple-macosx/release/KanbanCode_KanbanCode.bundle" "$BUNDLE_DIR/"
          fi

          # No codesign — ad-hoc signing not possible with root-level SPM resource bundle
          # Users will right-click > Open to bypass Gatekeeper (same as any unsigned app)

          cd build
          zip -ry "KanbanCode-${VERSION}-macos.zip" KanbanCode.app

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.meta.outputs.tag }}" \
            "build/KanbanCode-${{ steps.meta.outputs.version }}-macos.zip"
